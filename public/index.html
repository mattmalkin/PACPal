<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACPal | Medication Instruction Portal</title>
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>

    <div class="controls">
        <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
        <a href="admin.html" target="_blank" rel="noopener noreferrer" class="admin-button">⚙️ Admin Portal</a>
    </div>

    <header>
        <h1>PACPal Meds</h1>
        <p>Perioperative Medication Instructions</p>
        <p><strong>Database Update 3/18/26</strong></p>
        <p><small>This is not intended as medical advice for the general public.</small></p>
        <p id="status">↻ Connecting to Database...</p>
    </header>

    <div class="content-wrapper">
        <div class="search-box">
             <input type="text" id="medSearch" placeholder="Search (e.g., Lisinopril)...">
             <div id="searchResults"></div>
        </div>
        
        <div class="list-section">
             <h2 id="listHeader" style="display:none;">Selected Medications</h2>
             <div id="medicationList"></div>
             <button id="printBtn" style="display:none;" onclick="window.print()">Print/Save Medication List</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    
    <script src="app.js?v=2.2"></script>
</body>
</html>
