<!DOCTYPE html>
<html lang="en">
<head>
<!-- If the code is wack, blame Gemini. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACPal | Medication Instruction Portal</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
</head>
<body>

    <div class="container">
      <div class="controls">
        <button class="theme-btn" id="themeToggle">🌙 Dark Mode</button>
       <a href="admin.html" class="admin-button" target="_blank">Admin Portal</a>
      </div>   
         <header>
            <h1>PACPal Meds</h1>
            <h2>Perioperative Medication Instructions</h2>
            <h2>Database Update 3/18/26</h2>
            <p>This is not intended as medical advice for the general public.</p>
            <p id="status">Connecting to Google Sheets...</p>
        </header>

     <div class="content-wrapper">
        <div class="search-box">
            <input type="text" id="medSearch" placeholder="Type a medication name..." disabled>
            <div id="searchResults"></div>
        </div>

        <div class="list-section">
            <h2 id="listHeader" style="display:none;">Selected Medication List</h2>
            <div id="medicationList"></div>
            <button id="printBtn" onclick="window.print()">Print/Save Medication List</button>
         </div>
     </div>
     </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="app.js?v=2.0"></script>
</body>
</html>
