<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACPal Admin - Medication Management</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
</head>
<body>

    <div class="admin-container">
        <div class="controls">
            <button class="theme-btn" id="themeToggle">🌙 Dark Mode</button>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    
        <header>
            <h1 id="formTitle">PACPal Admin Dashboard</h1>
        </header>

        <section id="loginSection">
            <div class="card">
                <input type="email" id="loginEmail" placeholder="Admin Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button id="loginBtn" class="primary-btn">Login to PACPal</button>
                <p id="loginError" class="error" style="display:none;"></p>
            </div>
        </section>

        <section id="dataFormSection" style="display: none;">
        
            <h2>Authorized Admins</h2>
            <ul id="admin-list" class="admin-list"></ul>

            <hr>

            <h2>Weekly Briefing Mailing List</h2>
            <div class="card">
                <ul id="mailing-list-ui" class="admin-list" style="margin-bottom: 15px;"></ul>
                
                <div style="display: flex; gap: 10px;">
                    <input type="email" id="newEmailInput" placeholder="Add new email (e.g., nurse@clinic.com)" style="flex: 1; margin: 0;">
                    <button onclick="addMailingEmail()" class="add-btn" style="margin: 0; width: auto; padding: 0 20px;">Add</button>
                </div>
            </div>

            <hr>

            <h2>Add New Medication</h2>
            <form id="addMedForm" class="card">
                <label>Medication Name</label>
                <input type="text" id="medName" required placeholder="e.g. Lisinopril">

                <label>Category</label>
                <input type="text" id="medCategory" required placeholder="e.g. ACE Inhibitor">

                <label>Clinical Instructions</label>
                <textarea id="medInstructions" required placeholder="Dosage, timing, and safety warnings..."></textarea>

                <div class="btn-group">
                    <button type="submit" id="submitBtn" class="add-btn">Add to Database</button>
