<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f4f6f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 700px; margin-bottom: 20px; }
        h1, h2 { margin-top: 0; color: #2d3436; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #636e72; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        textarea { resize: vertical; height: 100px; }
        button { padding: 12px; background-color: #0984e3; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px;}
        button:hover { background-color: #74b9ff; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .cancel-btn { background-color: #b2bec3; display: none; }
        .logout-btn { background-color: #d63031; margin-top: 0; width: auto; padding: 8px 15px; font-size: 14px; float: right;}

        /* Admin Management Styles */
        .admin-list { list-style: none; padding: 0; margin-top: 15px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; border-radius: 6px; margin-bottom: 5px; font-family: monospace; font-size: 13px; }
        .remove-btn { background: #ff7675; width: auto; padding: 5px 10px; font-size: 12px; margin: 0; }

        .alphabet-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; justify-content: center; }
        .alpha-btn { width: 35px; height: 35px; padding: 0; margin: 0; background-color: #dfe6e9; color: #2d3436; font-size: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .alpha-btn.active { background-color: #0984e3; color: white; }

        .med-list { list-style: none; padding: 0; margin: 0; }
        .med-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #dfe6e9; }
        .med-info strong { font-size: 18px; color: #2d3436; display: block; }
        .med-actions { display: flex; gap: 10px; }
        .edit-btn { background-color: #00b894; width: auto; padding: 8px 12px; margin: 0; font-size: 14px;}
        .delete-btn { background-color: #d63031; width: auto; padding: 8px 12px; margin: 0; font-size: 14px;}

        #dataFormSection, #loginSection { display: none; }
        #statusMessage, #loginError { margin-top: 15px; text-align: center; font-weight: bold; }
        .success { color: #00b894; }
        .error { color: #d63031; }
    </style>
</head>
<body>

    <div id="loginSection" class="admin-container">
        <h1>PACPal Admin Login</h1>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Log In</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="dataFormSection" style="width: 100%; max-width: 700px;">
        
        <div class="admin-container">
            <button class="logout-btn" onclick="logout()">Log Out</button>
            <h2>System Access Control</h2>
            <p style="font-size: 12px; color: #636e72;">Authorized UIDs in the 'admins' collection:</p>
            <ul id="admin-list" class="admin-list"><li>Loading...</li></ul>
        </div>

        <div class="admin-container">
            <h1 id="formTitle">Add New Medication</h1>
            <form id="addMedForm">
                <label>Medication Name</label>
                <input type="text" id="medName" placeholder="e.g., Lisinopril" required>
                <label>Category</label>
                <input type="text" id="medCategory" placeholder="e.g., ACE Inhibitor" required>
                <label>Perioperative Instructions</label>
                <textarea id="medInstructions" placeholder="Enter instructions..." required></textarea>
                <div class="btn-group">
                    <button type="submit" id="submitBtn">Save to Database</button>
                    <button type="button" id="cancelBtn" class="cancel-btn" onclick="cancelEdit()">Cancel Edit</button>
                </div>
                <div id="statusMessage"></div>
            </form>
        </div>

        <div class="admin-container">
            <h2>Browse Database</h2>
            <div id="alphabetContainer" class="alphabet-container"></div>
            <ul id="databaseList" class="med-list"></ul>
            <div id="emptyState" style="text-align: center; color: #b2bec3; font-style: italic; margin-top: 20px;">Select a letter to view medications.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        console.log("PACPal Engine Started!");

        const firebaseConfig = {
            apiKey: "AIzaSyA5uz0RFyrCkxJocq8kZwFg_pcO2P6WTUg",
            authDomain: "pacpal-9f9bf.firebaseapp.com",
            projectId: "pacpal-9f9bf",
            storageBucket: "pacpal-9f9bf.firebasestorage.app",
            messagingSenderId: "993977477357",
            appId: "1:993977477357:web:72a2c5dee83d40e4b7c4e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentLetter = 'A';
        let currentResults = [];
        let editingId = null;

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dataFormSection').style.display = 'block';
                buildAlphabet(); 
                fetchByLetter('A');
                displayAdmins(); // Fetch admins only after login
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dataFormSection').style.display = 'none';
            }
        });

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (error) {
                document.getElementById('loginError').innerText = "Incorrect email or password.";
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() { auth.signOut(); }

        // --- ADMIN LIST LOGIC ---
        async function displayAdmins() {
    const listElement = document.getElementById('admin-list');
    try {
        const snapshot = await db.collection("admins").get();
        listElement.innerHTML = "";
        
        snapshot.forEach(doc => {
            const data = doc.data();
            // Fallback to "Unnamed Admin" if the field is missing
            const adminName = data.name || "Unnamed Admin"; 
            
            const li = document.createElement("li");
            li.className = "admin-item";
            
            // Displays Name in bold and UID in smaller text
            li.innerHTML = `
                <div>
                    <strong>${adminName}</strong><br>
                    <span style="font-size: 10px; color: #b2bec3;">ID: ${doc.id}</span>
                </div>
            `;
            listElement.appendChild(li);
        });
    } catch (error) {
        console.error("Admin fetch error:", error);
        listElement.innerHTML = "<li class='error'>Access Denied: Could not load admin names.</li>";
    }
}

        // --- ROLODEX & MEDICATION LOGIC ---
        function buildAlphabet() {
            const container = document.getElementById('alphabetContainer');
            container.innerHTML = '';
            'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
                const btn = document.createElement('button');
                btn.innerText = letter;
                btn.className = letter === currentLetter ? 'alpha-btn active' : 'alpha-btn';
                btn.onclick = () => fetchByLetter(letter);
                container.appendChild(btn);
            });
        }

        async function fetchByLetter(letter) {
            currentLetter = letter;
            buildAlphabet();
            const list = document.getElementById('databaseList');
            list.innerHTML = "<li>Loading...</li>";
            try {
                const snapshot = await db.collection('medications')
                    .where('name', '>=', letter)
                    .where('name', '<=', letter + '\uf8ff')
                    .orderBy('name').get();
                currentResults = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
            } catch (e) { list.innerHTML = "<li class='error'>Error fetching data.</li>"; }
        }

        function renderList() {
            const list = document.getElementById('databaseList');
            document.getElementById('emptyState').style.display = currentResults.length ? 'none' : 'block';
            list.innerHTML = currentResults.map(med => `
                <li class="med-item">
                    <div class="med-info"><strong>${med.name}</strong><span>${med.category}</span></div>
                    <div class="med-actions">
                        <button class="edit-btn" onclick="startEdit('${med.id}')">Edit</button>
                        <button class="delete-btn" onclick="deleteMed('${med.id}')">Delete</button>
                    </div>
                </li>`).join('');
        }

        document.getElementById('addMedForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Saving...";
            const medData = {
                name: document.getElementById('medName').value,
                category: document.getElementById('medCategory').value,
                instructions: document.getElementById('medInstructions').value
            };
            try {
                if (editingId) await db.collection('medications').doc(editingId).update(medData);
                else await db.collection('medications').add(medData);
                cancelEdit();
                fetchByLetter(medData.name.charAt(0).toUpperCase());
            } catch (e) { alert("Error: Could not save."); }
            finally { btn.innerText = editingId ? "Update Database" : "Save to Database"; }
        });

        function startEdit(id) {
            const med = currentResults.find(m => m.id === id);
            document.getElementById('medName').value = med.name;
            document.getElementById('medCategory').value = med.category;
            document.getElementById('medInstructions').value = med.instructions;
            editingId = id;
            document.getElementById('formTitle').innerText = "Edit: " + med.name;
            document.getElementById('submitBtn').innerText = "Update Database";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('addMedForm').reset();
            document.getElementById('formTitle').innerText = "Add New Medication";
            document.getElementById('submitBtn').innerText = "Save to Database";
            document.getElementById('cancelBtn').style.display = "none";
        }

        async function deleteMed(id, medName) {
    // 1. The Warning Popup
    const message = `⚠️ WARNING: Are you sure you want to permanently delete "${medName}"? \n\nThis action cannot be undone.`;
    
    if (confirm(message)) {
        try {
            // 2. Only runs if they click "OK"
            await db.collection('medications').doc(id).delete();
            console.log(`${medName} deleted successfully.`);
            
            // 3. Refresh the list to show it's gone
            fetchByLetter(currentLetter); 
        } catch (error) {
            alert("Error: Could not delete medication. Check your connection.");
            console.error("Delete error:", error);
        }
    } else {
        // 4. Runs if they click "Cancel"
        console.log("Delete cancelled by user.");
    }
}
    </script>
</body>
</html>
