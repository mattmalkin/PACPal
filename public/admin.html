<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginSection" class="admin-container">
        <h1>PACPal Admin Login</h1>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Log In</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="dataFormSection" style="width: 100%; max-width: 700px;">
        
        <div class="admin-container">
            <button class="logout-btn" onclick="logout()">Log Out</button>
            <h2>System Access Control</h2>
            <p style="font-size: 12px; color: #636e72;">Authorized UIDs in the 'admins' collection:</p>
            <ul id="admin-list" class="admin-list"><li>Loading...</li></ul>
        </div>

        <div class="admin-container">
            <h1 id="formTitle">Add New Medication</h1>
            <form id="addMedForm">
                <label>Medication Name</label>
                <input type="text" id="medName" placeholder="e.g., Lisinopril" required>
                <label>Category</label>
                <input type="text" id="medCategory" placeholder="e.g., ACE Inhibitor" required>
                <label>Perioperative Instructions</label>
                <textarea id="medInstructions" placeholder="Enter instructions..." required></textarea>
                <div class="btn-group">
                    <button type="submit" id="submitBtn">Save to Database</button>
                    <button type="button" id="cancelBtn" class="cancel-btn" onclick="cancelEdit()">Cancel Edit</button>
                </div>
                <div id="statusMessage"></div>
            </form>
        </div>

        <div class="admin-container">
            <h2>Browse Database</h2>
            <div id="alphabetContainer" class="alphabet-container"></div>
            <ul id="databaseList" class="med-list"></ul>
            <div id="emptyState" style="text-align: center; color: #b2bec3; font-style: italic; margin-top: 20px;">Select a letter to view medications.</div>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="admin.js"></script>
    
</body>
</html>
