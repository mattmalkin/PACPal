<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACPal Admin - Medication Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-container">
        <div class="controls">
        <button class="theme-btn" id="themeToggle">🌙 Dark Mode</button>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

        <header>
            <h1 id="formTitle">Add New Medication</h1>
        </header>

        <section id="loginSection">
            <div class="card">
                <input type="email" id="loginEmail" placeholder="Admin Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()" class="primary-btn">Login to PACPal</button>
                <p id="loginError" class="error" style="display:none;"></p>
            </div>
        </section>

        <section id="dataFormSection">
            <form id="addMedForm" class="card">
                <label>Medication Name</label>
                <input type="text" id="medName" required placeholder="e.g. Lisinopril">

                <label>Category</label>
                <input type="text" id="medCategory" required placeholder="e.g. ACE Inhibitor">

                <label>Clinical Instructions</label>
                <textarea id="medInstructions" required placeholder="Dosage, timing, and safety warnings..."></textarea>

                <div class="btn-group">
                    <button type="submit" id="submitBtn" class="add-btn">Save to Database</button>
                    <button type="button" id="cancelBtn" onclick="cancelEdit()" class="cancel-btn" style="display:none;">Cancel Edit</button>
                </div>
            </form>

            <hr>

            <h2>Current Medications</h2>
            <div id="alphabetContainer" class="alphabet-container"></div>
            <ul id="databaseList" class="med-list"></ul>
            <p id="emptyState" style="display:none;">No medications found for this letter.</p>

            <hr>

            <h2>Authorized Admins</h2>
            <ul id="admin-list" class="admin-list"></ul>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="admin.js"></script>
</body>
</html>
