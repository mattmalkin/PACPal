<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACPal Admin - Medication Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
</head>
<body>

    <div class="admin-container">
        <div class="controls">
            <button class="theme-btn" id="themeToggle">🌙 Dark Mode</button>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    
        <header>
            <h1 id="formTitle">Medication Update</h1>
        </header>

        <section id="loginSection">
            <div class="card">
                <input type="email" id="loginEmail" placeholder="Admin Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button id="loginBtn" class="primary-btn">Login to PACPal</button>
                <p id="loginError" class="error" style="display:none;"></p>
            </div>
        </section>

        <section id="dataFormSection" style="display: none;">
        
            <h2>Authorized Admins</h2>
        <ul id="admin-list" class="admin-list"></ul>

        <hr>

        <h2>Weekly Briefing Mailing List</h2>
        <div class="card">
            <ul id="mailing-list-ui" class="admin-list" style="margin-bottom: 15px;"></ul>
            
            <div style="display: flex; gap: 10px;">
                <input type="email" id="newEmailInput" placeholder="Add new email (e.g., pacrn@ucdavis.edu)" style="flex: 1; margin: 0;">
                <button onclick="addMailingEmail()" class="add-btn" style="margin: 0; width: auto; padding: 0 20px;">Add Subscriber</button>
            </div>
        </div>

        <hr>

            <hr>

<button id="saveBatchBtn" onclick="saveAllChanges()" style="display: none; background-color: #dc3545; color: white; padding: 10px 20px; font-weight: bold; margin-bottom: 15px;">
    ⚠️ Save Pending Changes
</button>

<div id="medication-table"></div>

        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="admin.js"></script>
</body>
</html>
