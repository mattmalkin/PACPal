<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Finder | Powered by Google Sheets</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --text: #333;
            --success: #27ae60;
            --warning: #e67e22;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            margin-right: 5px;
        }
        .status-online { background: var(--success); }

        /* Search Input Area */
        .search-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        #medSearch {
            width: 100%;
            padding: 20px 25px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }

        #medSearch:focus {
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.15);
        }

        /* Results Card */
        #results { min-height: 250px; }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typo-tag {
            color: var(--warning);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .med-name {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .category-badge {
            display: inline-block;
            background: #e1f5fe;
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .instruction-section {
            background: #f9fbff;
            border-left: 5px solid var(--success);
            padding: 20px;
            border-radius: 10px;
        }

        .instruction-section label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #7f8c8d;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .instruction-section p {
            line-height: 1.6;
            margin: 0;
            font-size: 16px;
        }

        .loading-text { text-align: center; color: #95a5a6; padding: 40px; }
        
        footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 11px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>PACPal Meds</h1>
            <h2>Database version 2/10/26</h2>
            <div id="connectionStatus"><span class="status-dot"></span> Connecting to database...</div>
        </header>

        <div class="search-wrapper">
            <input type="text" id="medSearch" placeholder="Search medication name..." disabled>
        </div>

        <div id="results">
            <div class="loading-text">Synchronizing with Google Sheets...</div>
        </div>
    </div>

    <footer>
        &copy; 2024 Private Medication Portal<br>
        CONFIDENTIAL: For authorized use only. Consult a doctor before following any medical advice.
    </footer>

    <script>
        // REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbytnpdjTGS5p0YQgwCA1_BOHOTahW8M9lZrFp_tcjSazQwZ2NlyS8qhuXn4RcTW5qk/exec';

        let myDatabase = [];
        let fuse;

        const searchInput = document.getElementById('medSearch');
        const resultsArea = document.getElementById('results');
        const statusDiv = document.getElementById('connectionStatus');

        // 1. Fetch data from Google Sheets
        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                myDatabase = await response.json();

                // Initialize Fuse.js for typo tolerance
                fuse = new Fuse(myDatabase, {
                    keys: ["name"],
                    threshold: 0.4,
                    includeScore: true
                });

                // UI Updates
                searchInput.disabled = false;
                searchInput.placeholder = "Search (e.g., Lisinopril)...";
                statusDiv.innerHTML = '<span class="status-dot status-online"></span> Database Synced';
                resultsArea.innerHTML = '<div class="loading-text">Database loaded. Ready to search.</div>';

            } catch (error) {
                statusDiv.innerHTML = '<span class="status-dot" style="background:red"></span> Connection Failed';
                resultsArea.innerHTML = '<div class="loading-text" style="color:red">Error: Could not reach Google Sheets. Check your URL.</div>';
                console.error(error);
            }
        }

        // 2. Search Logic
searchInput.addEventListener('input', () => {
    const query = searchInput.value;

    if (query.length < 2) {
        resultsArea.innerHTML = '<div class="loading-text">Waiting for input...</div>';
        return;
    }

    const searchResult = fuse.search(query);

    if (searchResult.length > 0) {
        // Instead of picking [0], we loop through all results
        let htmlContent = `<p style="text-align:center; color:#7f8c8d; margin-bottom:15px;">
                            Found ${searchResult.length} version(s)
                           </p>`;

        searchResult.forEach(result => {
            const item = result.item;
            const isExact = query.toLowerCase() === item.name.toLowerCase();

            htmlContent += `
                <div class="card" style="margin-bottom: 20px;">
                    ${!isExact ? `<span class="typo-tag">Suggested Match:</span>` : ''}
                    <h2 class="med-name">${item.name}</h2>
                    <div class="category-badge">${item.category || 'General'}</div>
                    <div class="instruction-section">
                        <label>Usage Instructions</label>
                        <p>${item.instructions || 'No instructions provided.'}</p>
                    </div>
                </div>
            `;
        });

        resultsArea.innerHTML = htmlContent;
    } else {
        resultsArea.innerHTML = '<div class="loading-text">No match found in your records.</div>';
    }
});

        // Start the app
        init();
    </script>
</body>

</html>
