name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - dev  # Now watching both branches
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PACPAL_9F9BF }}
          # If pushing to main, go live. If pushing to dev, create a preview link.
          channelId: ${{ github.ref == 'refs/heads/main' && 'live' || '' }}
          projectId: pacpal-9f9bf
