# This file handles BOTH live deploys (main) and previews (dev)
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PACPAL_9F9BF }}'
          projectId: pacpal-9f9bf
          # If the branch is 'main', we go to 'live'. 
          # For 'dev', we leave channelId empty so it auto-creates a preview.
          channelId: ${{ github.ref_name == 'main' && 'live' || '' }}
