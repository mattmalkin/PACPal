# This file handles BOTH live deploys (main) and previews (dev)
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_deploy  # Added ID to capture outputs
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PACPAL_9F9BF }}'
          projectId: 'pacpal-9f9bf'
          channelId: ${{ github.ref_name == 'main' && 'live' || 'dev' }}

      - name: Add Deployment Link to Summary
        if: always()
        env:
          DEPLOY_URL: ${{ steps.firebase_deploy.outputs.details_url }} 
        run: |
          echo "### 🚀 Firebase Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ github.ref_name == 'main' && 'live' || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** [$DEPLOY_URL]($DEPLOY_URL)" >> $GITHUB_STEP_SUMMARY
