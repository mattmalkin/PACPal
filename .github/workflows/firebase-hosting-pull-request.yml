# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request

env:
  # This stops the Node.js deprecation warnings in your PR logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_pr_preview  # Added ID for referencing
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PACPAL_9F9BF }}
          projectId: pacpal-9f9bf

      - name: Add Preview Link to Summary
        if: always()
        run: |
          echo "### 🛠️ Pull Request Preview" >> $GITHUB_STEP_SUMMARY
          echo "The changes in this PR have been deployed for review." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** [${{ steps.firebase_pr_preview.outputs.details_url }}](${ { steps.firebase_pr_preview.outputs.details_url }})" >> $GITHUB_STEP_SUMMARY
          echo "**Expire Time:** ${{ steps.firebase_pr_preview.outputs.expire_time }}" >> $GITHUB_STEP_SUMMARY
