# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request

env:
  # This stops the Node.js deprecation warnings in your PR logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase_pr_preview  # Added ID for referencing
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PACPAL_9F9BF }}
          projectId: pacpal-9f9bf

      - name: Add Preview Link to Summary # Fixed: Indented to align with the steps above
        if: always()
        env:
          PREVIEW_URL: ${{ steps.firebase_pr_preview.outputs.details_url }}
          EXPIRY: ${{ steps.firebase_pr_preview.outputs.expire_time }}
        run: |
          echo "### 🛠️ Pull Request Preview" >> $GITHUB_STEP_SUMMARY
          echo "URL: [$PREVIEW_URL]($PREVIEW_URL)" >> $GITHUB_STEP_SUMMARY
          echo "Expires: $EXPIRY" >> $GITHUB_STEP_SUMMARY
